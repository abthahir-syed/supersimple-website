<!DOCTYPE html>
<html>
<head>
<title>HDFC Verification</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #eef2f7, #f8fbff);
}

.container {
    max-width: 1100px;
}

.card {
    border-radius: 15px;
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.section-title {
    font-weight: bold;
    color: #0d6efd;
    margin-bottom: 10px;
    border-left: 4px solid #0d6efd;
    padding-left: 8px;
}

input, select, textarea {
    border-radius: 8px !important;
}

.btn {
    border-radius: 8px;
}

.header-box {
    background: #0d6efd;
    color: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}
</style>

</head>

<body class="p-3">

<div class="container">

<div class="header-box text-center">
<h4>🏦 HDFC Case Verification</h4>
<small>Professional Verification Panel</small>
</div>

<!-- 🔥 FORM START -->
<form method="POST"
      action="{{ url_for('submit_hdfc', case_id=case['id']) }}"
      enctype="multipart/form-data">

<input type="hidden" name="case_id" value="{{ case['id'] }}">

<!-- 🔹 BASIC DETAILS -->
<div class="card p-3 mb-3">
<div class="section-title">Basic Details</div>

<div class="row g-2">

<div class="col-md-4">
<label>Case ID</label>
<input class="form-control" value="{{ case['id'] }}" readonly>
</div>

<div class="col-md-4">
<label>Reference No</label>
<input class="form-control" value="{{ case['ref_no'] }}" readonly>
</div>

<div class="col-md-4">
<label>Client Name</label>
<input class="form-control" value="{{ case['client_name'] }}" readonly>
</div>

</div>
</div>

<!-- 🔹 BVR DETAILS -->
<div class="card p-3 mb-3">
<div class="section-title">BVR Details</div>

<div class="row g-2">

<div class="col-md-6">
<label>Mobile No</label>
<input name="mobile" class="form-control">
</div>

<div class="col-md-6">
<label>Contact Person</label>
<input name="contact_person" class="form-control">
</div>

<div class="col-md-12">
<label>Remarks</label>
<textarea name="remarks" class="form-control"></textarea>
</div>

</div>
</div>

<!-- 🔹 ADDRESS -->
<div class="card p-3 mb-3">
<div class="section-title">Office Address</div>

<input class="form-control mb-2" value="{{ case['address'] }}" readonly>

<div class="row g-2">
<div class="col-md-4">
<input class="form-control" value="{{ case['city'] }}" readonly>
</div>
<div class="col-md-4">
<input class="form-control" value="{{ case['state'] }}" readonly>
</div>
<div class="col-md-4">
<input class="form-control" value="{{ case['pincode'] }}" readonly>
</div>
</div>

</div>

<!-- 🔹 SUMMARY -->
<div class="card p-3 mb-3">
<div class="section-title">Summary</div>

<div class="row g-2">

<div class="col-md-6">
<label>Change in Address</label>
<select name="change_address" class="form-control">
<option>No</option>
<option>Yes</option>
</select>
</div>

<div class="col-md-6">
<label>Reason</label>
<select name="reason" class="form-control">
<option>Customer Shifted</option>
<option>Not Known</option>
<option>Transfer</option>
</select>
</div>

</div>
</div>

<!-- 🔹 APPLICATION -->
<div class="card p-3 mb-3">
<div class="section-title">Application Details</div>

<div class="row g-2">

<div class="col-md-4">
<label>Company</label>
<input name="company" class="form-control">
</div>

<div class="col-md-4">
<label>Designation</label>
<input name="designation" class="form-control">
</div>

<div class="col-md-4">
<label>DOB</label>
<input type="date" name="dob" class="form-control">
</div>

</div>
</div>

<!-- 🔹 OBSERVATION -->
<div class="card p-3 mb-3">
<div class="section-title">Observation</div>

<div class="row g-2">

<div class="col-md-6">
<label>Name Board</label>
<select name="name_board" class="form-control">
<option>Visible</option>
<option>Invisible</option>
</select>
</div>

<div class="col-md-6">
<label>Business Activity</label>
<select name="business_activity" class="form-control">
<option>High</option>
<option>Medium</option>
<option>Low</option>
<option>None</option>
</select>
</div>

<div class="col-md-6">
<label>Proof Collected</label>
<select name="proof" class="form-control">
<option>Yes</option>
<option>No</option>
</select>
</div>

<div class="col-md-6">
<label>TCP Done</label>
<select name="tcp" class="form-control">
<option>Yes</option>
<option>No</option>
</select>
</div>

</div>
</div>

<!-- 🔹 STATUS -->
<div class="card p-3 mb-3">
<div class="section-title">Final Status</div>

<select name="status" class="form-control">
<option value="Completed">Completed</option>
<option value="Rejected">Rejected</option>
</select>

</div>

<!-- 🔹 FEEDBACK -->
<div class="card p-3 mb-3">
<div class="section-title">Final Feedback</div>

<textarea name="final_feedback" class="form-control"></textarea>

</div>

<!-- 🔹 PHOTO -->
<div class="card p-3 mb-3">
<div class="section-title">Upload Photos</div>

<input type="file" name="photo1" class="form-control mb-2">
<input type="file" name="photo2" class="form-control">

</div>

<!-- 🔥 QUICK ACTION -->
<div class="mb-3 text-center">
<button type="button" class="btn btn-success" onclick="positive()"> Positive</button>
<button type="button" class="btn btn-danger" onclick="negative()"> Negative</button>
</div>

<!-- 🔥 SUBMIT -->
<div class="d-flex justify-content-between">

<a href="/hdfc_cases" class="btn btn-secondary"> Back</a>

<button class="btn btn-primary px-4">Submit Case</button>

</div>

</form>

</div>

<script>
function positive(){
    document.querySelector("[name='name_board']").value="Visible";
    document.querySelector("[name='business_activity']").value="High";
}
function negative(){
    document.querySelector("[name='name_board']").value="Invisible";
    document.querySelector("[name='business_activity']").value="None";
}
</script>

</body>
</html>
