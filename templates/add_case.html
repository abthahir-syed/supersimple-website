<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Add New Case</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}
.card {
    border-radius: 15px;
}
.preview-img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>

</head>

<body>

<div class="container mt-5">
<div class="card shadow-lg p-4">

<h3 class="text-center mb-4 text-primary">🏦 Add New Case</h3>

<form method="POST" enctype="multipart/form-data" onsubmit="return getLocationAndSubmit(this)">

<!-- 🔥 PORTAL TYPE -->
<div class="mb-3">
<label class="fw-bold">Portal Type</label>
<select name="portal_type" class="form-control" onchange="setBankName(this)">
    <option value="HDFC">HDFC</option>
    <option value="MUTHOOT">Muthoot</option>
</select>
</div>

<div class="row">

<!-- LEFT -->
<div class="col-md-6">

<div class="mb-3">
<label>Ref No</label>
<input type="text" name="ref_no" class="form-control" required>
</div>

<div class="mb-3">
<label>Client Name</label>
<input type="text" name="client_name" class="form-control" required>
</div>

<div class="mb-3">
<label>CPV Type</label>
<input type="text" name="cpv_type" class="form-control">
</div>

<div class="mb-3">
<label>Bank Name</label>
<input type="text" name="bank_name" id="bank_name" value="HDFC" class="form-control">
</div>

<div class="mb-3">
<label>Priority</label>
<select name="priority" class="form-control">
<option value="High">High</option>
<option value="Medium">Medium</option>
<option value="Low">Low</option>
</select>
</div>

</div>

<!-- RIGHT -->
<div class="col-md-6">

<div class="mb-3">
<label>Pincode</label>
<input type="text" name="pincode" class="form-control">
</div>

<div class="mb-3">
<label>Status</label>
<select name="status" class="form-control">
<option value="Pending">Pending</option>
<option value="In Progress">In Progress</option>
<option value="Completed">Completed</option>
<option value="Rejected">Rejected</option>
</select>
</div>

<div class="mb-3">
<label>Agency</label>
<input type="text" name="agency" class="form-control">
</div>

<div class="mb-3">
<label>Assign Agent</label>
<input type="text" name="assigned_agent" class="form-control">
</div>

<div class="mb-3">
<label>Address</label>
<textarea name="address" class="form-control" rows="2" required></textarea>
</div>

</div>

</div>

<hr>

<!-- 📸 MULTIPLE PHOTOS -->
<h5 class="text-secondary">📸 Upload Photos</h5>

<div class="row">

<div class="col-md-4 mb-2">
<input type="file" name="photo1" class="form-control" onchange="previewImage(event)">
</div>

<div class="col-md-4 mb-2">
<input type="file" name="photo2" class="form-control" onchange="previewImage(event)">
</div>

<div class="col-md-4 mb-2">
<input type="file" name="photo3" class="form-control" onchange="previewImage(event)">
</div>

<div class="col-md-4 mb-2">
<input type="file" name="photo4" class="form-control" onchange="previewImage(event)">
</div>

<div class="col-md-4 mb-2">
<input type="file" name="photo5" class="form-control" onchange="previewImage(event)">
</div>

</div>

<div id="preview" class="mt-2"></div>

<hr>

<!-- 📷 CAMERA -->
<div class="mb-3">
<label>📷 Capture Live Photo</label>
<input type="file" name="photo" accept="image/*" capture="camera" class="form-control">
</div>

<!-- 📍 LOCATION -->
<input type="hidden" name="lat" id="lat">
<input type="hidden" name="lng" id="lng">

<div class="text-center">
<button type="submit" class="btn btn-success px-5">
  Submit Case
</button>
</div>

</form>

</div>
</div>

<!-- 📍 LOCATION -->
<script>
function getLocationAndSubmit(form) {

    if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(
            function(position) {

                document.getElementById("lat").value = position.coords.latitude;
                document.getElementById("lng").value = position.coords.longitude;

                form.submit();
            },
            function(error) {
                alert("⚠️ Location allow pannunga bro!");
                form.submit();
            }
        );

        return false;

    } else {
        return true;
    }
}
</script>

<!-- 📸 PREVIEW -->
<script>
function previewImage(event) {

    let preview = document.getElementById("preview");

    let img = document.createElement("img");
    img.src = URL.createObjectURL(event.target.files[0]);
    img.classList.add("preview-img");

    preview.appendChild(img);
}
</script>

<!-- 🔥 AUTO BANK NAME -->
<script>
function setBankName(select){

    let bank = document.getElementById("bank_name");

    if(select.value === "MUTHOOT"){
        bank.value = "MUTHOOT";
    } else {
        bank.value = "HDFC";
    }
}
</script>

</body>
</html>
