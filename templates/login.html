<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - CPV Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Background */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    font-family: 'Poppins', sans-serif;
}

/* Glass Card */
.login-card {
    width: 100%;
    max-width: 350px;
    padding: 25px;
    border-radius: 16px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    color: white;
}

/* Inputs */
.form-control {
    border-radius: 10px;
    border: none;
}

.form-control:focus {
    box-shadow: 0 0 5px rgba(255,255,255,0.5);
}

/* Button */
.btn-login {
    border-radius: 10px;
    background: #fff;
    color: #333;
    font-weight: bold;
}

.btn-login:hover {
    background: #f2f2f2;
}

/* Title */
.login-title {
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
}

/* Small text */
.small-text {
    font-size: 13px;
    text-align: center;
}

</style>

</head>

<body>

<div class="login-card">

    <h4 class="login-title"> CPV Portal</h4>

    <form method="POST">

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            Login
        </button>

    </form>

    <p class="small-text mt-3">
        Secure Access Only
    </p>

</div>

</body>
</html>
