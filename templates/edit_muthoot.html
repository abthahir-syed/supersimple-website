<!DOCTYPE html>
<html>
<head>
<title>Edit Muthoot Case</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">

<div class="container">

<h3> Edit Muthoot Case</h3>

<form method="POST">

<div class="mb-3">
<label>Customer Name</label>
<input type="text" name="customer_name" value="{{ case[3] }}" class="form-control">
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" name="address" value="{{ case[15] }}" class="form-control">
</div>

<div class="mb-3">
<label>City</label>
<input type="text" name="city" value="{{ case[17] }}" class="form-control">
</div>

<div class="mb-3">
<label>Status</label>
<select name="status" class="form-control">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>
</div>

<div class="mb-3">
<label>Final Status</label>
<select name="final_status" class="form-control">
<option>Eligible</option>
<option>Not Eligible</option>
</select>
</div>

<button class="btn btn-success">Update</button>
<a href="/view_case" class="btn btn-secondary">Cancel</a>

</form>

</div>

</body>
</html>
