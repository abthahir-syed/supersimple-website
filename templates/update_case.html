<!DOCTYPE html>
<html>
<head>
    <title>Update Case</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fb;
        }

        .card {
            border-radius: 12px;
        }

        .photo-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card shadow p-3">

        <h5 class="mb-3 text-primary">📄 Update Case</h5>

        <!-- 🔍 BASIC INFO -->
        <div class="mb-3">
            <strong>Case No:</strong> {{ case['case_number'] }} <br>
            <strong>Client:</strong> {{ case['client_name'] }} <br>
            <strong>Address:</strong> {{ case['address'] }} <br>
            <strong>Pincode:</strong> {{ case['pincode'] }}
        </div>

        <form method="POST" enctype="multipart/form-data">

            <!-- STATUS -->
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-control">
                    <option {% if case['status']=="Pending" %}selected{% endif %}>Pending</option>
                    <option {% if case['status']=="Completed" %}selected{% endif %}>Completed</option>
                    <option {% if case['status']=="In Progress" %}selected{% endif %}>In Progress</option>
                    <option {% if case['status']=="Rejected" %}selected{% endif %}>Rejected</option>
                </select>
            </div>

            <!-- FEEDBACK -->
            <div class="mb-3">
                <label class="form-label">Feedback</label>
                <textarea name="feedback" class="form-control" rows="3"
                placeholder="Enter FE remarks...">{{ case['feedback'] }}</textarea>
            </div>

            <!-- EXISTING PHOTOS -->
            <div class="mb-3">
                <label class="form-label">Existing Photos</label><br>

                {% for i in range(1,6) %}
                    {% set photo = case['photo' ~ i] %}
                    {% if photo %}
                        <img src="/{{ photo }}" class="photo-preview me-2 mb-2">
                    {% endif %}
                {% endfor %}
            </div>

            <!-- NEW PHOTOS -->
            <div class="mb-3">
                <label class="form-label">Upload New Photos</label>

                <input type="file" name="photo1" class="form-control mb-2">
                <input type="file" name="photo2" class="form-control mb-2">
                <input type="file" name="photo3" class="form-control mb-2">
                <input type="file" name="photo4" class="form-control mb-2">
                <input type="file" name="photo5" class="form-control mb-2">
            </div>

            <!-- ACTION BUTTONS -->
            <div class="d-flex justify-content-between">

                <a href="/dashboard" class="btn btn-secondary">
                    ← Back
                </a>

                <button class="btn btn-success">
                    ✔ Submit Update
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
