<!DOCTYPE html>
<html>

<head>
<title>Upload Cases</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.card {
    border-radius: 15px;
}

.upload-box {
    border: 2px dashed #0d6efd;
    padding: 30px;
    text-align: center;
    border-radius: 10px;
    background: #f8fbff;
    transition: 0.3s;
}

.upload-box:hover {
    background: #eef5ff;
}

#fileName {
    margin-top: 10px;
    color: #0d6efd;
    font-weight: 500;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="card shadow-lg p-4">

<h4 class="text-center text-primary mb-3">📤 Upload Cases Excel</h4>

<form method="POST" enctype="multipart/form-data">

<!-- 📂 Upload Box -->
<div class="upload-box mb-3">
    <input type="file" name="file" id="fileInput" class="form-control" required>
    <div id="fileName"></div>
</div>

<!-- 🔘 Buttons -->
<div class="text-center">
    <button class="btn btn-success px-4">⬆ Upload</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary px-4">⬅ Back</a>
</div>

</form>

<hr>

<!-- 📌 Format Guide -->
<h6 class="text-primary">📌 Excel Format</h6>

<table class="table table-bordered text-center table-sm">
<tr class="table-dark">
<th>Application Number</th>
<th>Applicant Name</th>
<th>CPV Type</th>
<th>Address</th>
<th>City</th>
<th>Pincode</th>
<th>Status</th>
</tr>

<tr>
<td>HDFC001</td>
<td>Ravi</td>
<td>Residence</td>
<td>Chennai</td>
<td>Chennai</td>
<td>600001</td>
<td>Pending</td>
</tr>

<tr>
<td>MUT001</td>
<td>Kumar</td>
<td>Office</td>
<td>Madurai</td>
<td>Madurai</td>
<td>625001</td>
<td>Pending</td>
</tr>
</table>

<div class="alert alert-warning mt-2">
⚠ Column names and Rows same becaues woring Data
</div>

</div>
</div>

<script>
// 📂 Show file name
document.getElementById("fileInput").addEventListener("change", function(){
    if(this.files.length > 0){
        document.getElementById("fileName").innerText = "Selected: " + this.files[0].name;
    }
});
</script>

</body>

</html>
